SPECIFICATION Spec

\* Model the file universe as concrete sets.
\* Each "file" is a model value representing a category.
CONSTANTS
    \* All possible files the agent might request
    Files = {specs_tla, mappings_json, target_py, prepare_py, autospec_py, escape_path, root_file, program_md}

    \* Allowed directory membership (which files are in allowed dirs)
    AllowedDirs = {specs_tla, mappings_json, target_py}

    \* Forbidden filenames
    ForbiddenNames = {prepare_py, autospec_py, program_md}

    \* Files that resolve inside ROOT
    InRoot = {specs_tla, mappings_json, target_py, prepare_py, autospec_py, root_file, program_md}

    \* Files that escape ROOT (path traversal)
    EscapesRoot = {escape_path}

INVARIANT TypeOK
INVARIANT ForbiddenNeverWritten
INVARIANT PathTraversalBlocked
INVARIANT OnlyAllowedDirsWritten
INVARIANT WrittenOrBlocked
INVARIANT NoFileLost
INVARIANT OnlyWritableFilesWritten
